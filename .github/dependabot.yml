version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: 0 6 * * *
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    reviewers:
      - agoodkind
  - package-ecosystem: swift
    directory: /Tuist
    schedule:
      interval: cron
      cronjob: 0 6 * * *
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    reviewers:
      - agoodkind
