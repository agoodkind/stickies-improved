name: Release

on:
  push:
    branches:
      - main
    paths:
      - Modules/**
      - App/**
      - Project.swift
      - Tuist.swift
      - Tuist/**
      - Config/**
      - Scripts/**
      - Templates/**
      - Makefile
      - .github/workflows/release.yml
  workflow_dispatch:

# The caller must grant every permission the called workflow's jobs request.
permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    uses: agoodkind/swift-makefile/.github/workflows/_release.yml@main
    with:
      runner: macos-26
      signing-identity-name: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
      apple-team-id: H3BMXM4W7H
      install-provisioning-profile: true
      notarize-pattern: "*.dmg"
      sbom-subject-path: "Products/Stickies Improved.app"
    secrets: inherit
