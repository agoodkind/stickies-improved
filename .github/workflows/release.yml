name: Release

on:
  push:
    branches:
      - main
    paths:
      - Modules/**
      - App/**
      - Project.swift
      - Tuist.swift
      - Tuist/**
      - Config/**
      - Scripts/**
      - Templates/**
      - Makefile
      - mise.toml
      - .github/workflows/release.yml
      - .github/actions/setup-build-env/action.yml
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

env:
  XCODE_VERSION: "latest-stable"
  APPLE_TEAM_ID: H3BMXM4W7H
  APPLE_CODE_SIGN_IDENTITY: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
  APPLE_NOTARY_KEY_ID: JHC8GR65Q3
  # The swift-makefile bootstrap fetches swift.mk via `gh api` on every make
  # invocation; without a token gh fails and the fetch silently writes an empty
  # swift.mk, so the build target never loads. Authenticate the public fetch.
  GH_TOKEN: ${{ github.token }}

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      build_version: ${{ steps.meta.outputs.build_version }}
      marketing_version: ${{ steps.meta.outputs.marketing_version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          github-token: ${{ github.token }}

      - name: Install Tuist dependencies
        run: make install-dependencies

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          timestamp_utc="$(date -u +%Y%m%d%H%M)"
          hex_run_number="$(printf '%x' "$GITHUB_RUN_NUMBER")"
          short_sha="$(git rev-parse --short HEAD)"
          build_version="${timestamp_utc}${GITHUB_RUN_NUMBER}"
          tag="${timestamp_utc}-${hex_run_number}-${short_sha}"
          marketing_version="$(date -u +%y.%-m.%-d)"

          if [[ "${#build_version}" -gt 18 ]]; then
              echo "CURRENT_PROJECT_VERSION exceeds Apple's 18-character CFBundleVersion limit: ${build_version}" >&2
              exit 1
          fi

          {
              printf 'tag=%s\n' "$tag"
              printf 'build_version=%s\n' "$build_version"
              printf 'marketing_version=%s\n' "$marketing_version"
          } >> "$GITHUB_OUTPUT"

      - name: Install provisioning profile
        env:
          APPLE_DEVELOPER_ID_PROFILE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/Developer-ID.provisionprofile"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          if [[ -z "$APPLE_DEVELOPER_ID_PROFILE_BASE64" ]]; then
              echo "APPLE_DEVELOPER_ID_PROFILE_BASE64 is required for Developer ID releases with iCloud entitlements" >&2
              exit 1
          fi
          printf '%s' "$APPLE_DEVELOPER_ID_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -o - -)"
          PROFILE_NAME="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -o - -)"
          mkdir -p "$PROFILE_DIR"
          cp "$PROFILE_PATH" "$PROFILE_DIR/$PROFILE_UUID.provisionprofile"
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Import signing certificate
        id: import-cert
        uses: agoodkind/swift-makefile/.github/actions/import-signing-cert@main
        with:
          p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          identity-name: ${{ env.APPLE_CODE_SIGN_IDENTITY }}

      - name: Export signing identity
        run: |
          echo "DEVELOPER_ID_SIGN_IDENTITY_SHA1=${{ steps.import-cert.outputs.identity-sha1 }}" >> "$GITHUB_ENV"
          echo "DMG_SIGN_IDENTITY=${{ steps.import-cert.outputs.identity-sha1 }}" >> "$GITHUB_ENV"

      - name: Write release xcconfig
        env:
          APP_BUNDLE_ID: io.goodkind.stickies-improved
          ICLOUD_CONTAINER_IDENTIFIER: H3BMXM4W7H.io.goodkind.stickies-improved
          DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
          CODE_SIGN_IDENTITY: ${{ steps.import-cert.outputs.identity-sha1 }}
          MARKETING_VERSION: ${{ steps.meta.outputs.marketing_version }}
          CURRENT_PROJECT_VERSION: ${{ steps.meta.outputs.build_version }}
          SPARKLE_FEED_URL: https://goodkind.io/stickies-improved/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: Scripts/write-release-xcconfig.sh

      - name: Generate project
        run: tuist generate --no-open

      - name: Build release DMG
        run: |
          make release-assets \
            MARKETING_VERSION="${{ steps.meta.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.meta.outputs.build_version }}"

      - name: Generate app SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          path: Products/StickiesImproved.app
          syft-version: v1.44.0
          format: spdx-json
          output-file: Products/StickiesImproved-${{ steps.meta.outputs.build_version }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - uses: actions/upload-artifact@v7
        with:
          name: release-sbom-${{ steps.meta.outputs.tag }}
          path: Products/StickiesImproved-${{ steps.meta.outputs.build_version }}.spdx.json
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: release-dmg-${{ steps.meta.outputs.tag }}
          path: Products/StickiesImproved-${{ steps.meta.outputs.build_version }}.dmg
          if-no-files-found: error

  notarize:
    runs-on: macos-latest
    needs: build
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          github-token: ${{ github.token }}

      - name: Install Tuist dependencies
        run: make install-dependencies

      - uses: actions/download-artifact@v8
        with:
          name: release-dmg-${{ needs.build.outputs.tag }}
          path: Products

      - uses: actions/download-artifact@v8
        with:
          name: release-sbom-${{ needs.build.outputs.tag }}
          path: Products

      - name: Notarize and staple DMG
        uses: agoodkind/swift-makefile/.github/actions/notarize-staple@main
        with:
          artifact-path: Products/StickiesImproved-${{ needs.build.outputs.build_version }}.dmg
          notary-key-base64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          notary-key-id: ${{ env.APPLE_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

      - name: Attest stapled DMG provenance
        uses: actions/attest@v4.1.0
        with:
          subject-path: Products/StickiesImproved-${{ needs.build.outputs.build_version }}.dmg

      - name: Attest stapled DMG SBOM
        uses: actions/attest@v4.1.0
        with:
          subject-path: Products/StickiesImproved-${{ needs.build.outputs.build_version }}.dmg
          sbom-path: Products/StickiesImproved-${{ needs.build.outputs.build_version }}.spdx.json

      - uses: actions/upload-artifact@v7
        with:
          name: release-dmg-stapled-${{ needs.build.outputs.tag }}
          path: Products/StickiesImproved-${{ needs.build.outputs.build_version }}.dmg
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - build
      - notarize
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: release-dmg-stapled-${{ needs.build.outputs.tag }}
          path: release-assets

      - uses: actions/download-artifact@v8
        with:
          name: release-sbom-${{ needs.build.outputs.tag }}
          path: release-assets

      - name: Push release tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.build.outputs.tag }}" "$GITHUB_SHA"
          git push origin "refs/tags/${{ needs.build.outputs.tag }}"

      - name: Create GitHub release with assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
          BUILD_VERSION: ${{ needs.build.outputs.build_version }}
        run: |
          gh release create "$TAG" \
            "release-assets/StickiesImproved-${BUILD_VERSION}.dmg" \
            "release-assets/StickiesImproved-${BUILD_VERSION}.spdx.json" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "Automated release for $GITHUB_SHA"
