name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    env:
      APPLE_TEAM_ID: H3BMXM4W7H
      APPLE_CODE_SIGN_IDENTITY: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
      APPLE_NOTARY_KEY_ID: JHC8GR65Q3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2

      - name: Install Tuist dependencies
        run: tuist install

      - name: Compute release metadata
        id: meta
        run: |
          TS=$(date -u +%Y%m%d%H%M)
          HEX=$(printf '%x' "$GITHUB_RUN_NUMBER")
          SHA=$(git rev-parse --short HEAD)
          TAG="${TS}-${HEX}-${SHA}"
          SHORT_VERSION=$(date -u +%Y.%-m.%-d)
          {
            echo "tag=$TAG"
            echo "build_version=$TS"
            echo "marketing_version=$SHORT_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Install provisioning profile
        env:
          APPLE_DEVELOPER_ID_PROFILE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/Developer-ID.provisionprofile"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          if [[ -z "$APPLE_DEVELOPER_ID_PROFILE_BASE64" ]]; then
              echo "APPLE_DEVELOPER_ID_PROFILE_BASE64 is required for Developer ID releases with iCloud entitlements" >&2
              exit 1
          fi
          printf '%s' "$APPLE_DEVELOPER_ID_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -o - -)"
          PROFILE_NAME="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -o - -)"
          mkdir -p "$PROFILE_DIR"
          cp "$PROFILE_PATH" "$PROFILE_DIR/$PROFILE_UUID.provisionprofile"
          echo "PROVISIONING_PROFILE_SPECIFIER=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Import signing certificate
        id: import-cert
        uses: agoodkind/swift-makefile/.github/actions/import-signing-cert@main
        with:
          p12-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          identity-name: ${{ env.APPLE_CODE_SIGN_IDENTITY }}

      - name: Export signing identity
        run: |
          echo "DEVELOPER_ID_SIGN_IDENTITY_SHA1=${{ steps.import-cert.outputs.identity-sha1 }}" >> "$GITHUB_ENV"
          echo "DMG_SIGN_IDENTITY=${{ steps.import-cert.outputs.identity-sha1 }}" >> "$GITHUB_ENV"

      - name: Write release xcconfig
        env:
          APP_BUNDLE_ID: io.goodkind.stickies-improved
          ICLOUD_CONTAINER_IDENTIFIER: H3BMXM4W7H.io.goodkind.stickies-improved
          DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
          CODE_SIGN_IDENTITY: ${{ steps.import-cert.outputs.identity-sha1 }}
          MARKETING_VERSION: ${{ steps.meta.outputs.marketing_version }}
          CURRENT_PROJECT_VERSION: ${{ steps.meta.outputs.build_version }}
          SPARKLE_FEED_URL: https://goodkind.io/stickies-improved/appcast.xml
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: Scripts/write-release-xcconfig.sh

      - name: Generate project
        run: tuist generate --no-open

      - name: Build release DMG
        run: |
          make release-assets \
            MARKETING_VERSION="${{ steps.meta.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.meta.outputs.build_version }}"

      - name: Notarize and staple DMG
        uses: agoodkind/swift-makefile/.github/actions/notarize-staple@main
        with:
          artifact-path: "Products/StickiesImproved-${{ steps.meta.outputs.build_version }}.dmg"
          notary-key-base64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          notary-key-id: ${{ env.APPLE_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes "Automated release for $GITHUB_SHA"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "Products/StickiesImproved-${{ steps.meta.outputs.build_version }}.dmg" \
            --clobber

      - name: Generate Sparkle appcast
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          BUILD_VERSION: ${{ steps.meta.outputs.build_version }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          export SPARKLE_PRIVATE_KEY_FILE="$RUNNER_TEMP/sparkle_private_key"
          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" > "$SPARKLE_PRIVATE_KEY_FILE"
          make prepare-sparkle-updates \
            CURRENT_PROJECT_VERSION="$BUILD_VERSION" \
            RELEASE_TAG="$RELEASE_TAG" \
            GITHUB_RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy Cloudflare worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cp build/sparkle-updates/appcast.xml deploy/appcast-worker/public/appcast.xml
          npx wrangler deploy --config deploy/appcast-worker/wrangler.toml
