name: Dependabot Auto Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  automerge:
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # gh pr merge --delete-branch shells out to git to clean up the local
      # branch, so it needs a checkout; without one it aborts with
      # "fatal: not a git repository" before the merge happens.
      - uses: actions/checkout@v6

      - name: Merge passing Dependabot pull request
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        shell: bash
        run: |
          set -euo pipefail

          pr_json="$(gh pr list --state open --head "$HEAD_BRANCH" --json number,author,isDraft)"
          pr_number="$({ printf '%s' "$pr_json" | jq -r '.[] | select(.author.login == "dependabot[bot]" and (.isDraft | not)) | .number'; } | head -n 1)"

          if [[ -z "$pr_number" ]]; then
              echo "No open non-draft Dependabot PR found for branch $HEAD_BRANCH"
              exit 0
          fi

          gh pr merge "$pr_number" --squash --delete-branch
