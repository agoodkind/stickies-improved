name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "latest-stable"
  # The swift-makefile bootstrap fetches swift.mk via `gh api` on every make
  # invocation; without a token gh fails and the fetch silently writes an empty
  # swift.mk, so the build target never loads. Authenticate the public fetch.
  GH_TOKEN: ${{ github.token }}

jobs:
  verify:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build-env
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          github-token: ${{ github.token }}

      - name: Install Tuist dependencies
        run: make install-dependencies

      - name: Check project
        run: make check

      - name: Build project
        run: make build

      - name: Test project
        run: make test
