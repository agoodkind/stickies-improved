name: Deploy Appcast

# Deploys the Sparkle appcast to the Cloudflare worker.
# Triggers:
#   - workflow_run: fires after the Release workflow completes. This is the path that
#     runs for normal releases, since the release is created with the bot GITHUB_TOKEN,
#     which cannot fire a `release:` event.
#   - release (published): covers releases cut manually / outside the Release workflow.
#   - workflow_dispatch: manual redeploy of a given tag.
on:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to redeploy appcast from
        required: true
        type: string

env:
  XCODE_VERSION: "latest-stable"
  # The swift-makefile bootstrap fetches swift.mk via `gh api` on every make
  # invocation; without a token gh fails and the fetch silently writes an empty
  # swift.mk, so the build target never loads. Authenticate the public fetch.
  GH_TOKEN: ${{ github.token }}

jobs:
  deploy-appcast:
    # On the workflow_run path, only deploy when the Release run succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.release_tag }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            release)
                tag="$RELEASE_EVENT_TAG"
                ;;
            workflow_dispatch)
                tag="$DISPATCH_TAG"
                ;;
            workflow_run)
                tag="$(git tag --points-at "$RUN_HEAD_SHA" | head -n 1)"
                ;;
            *)
                tag=""
                ;;
          esac

          if [[ -z "$tag" ]]; then
              echo "Could not resolve a release tag for event '$EVENT_NAME'" >&2
              exit 1
          fi

          printf 'RELEASE_TAG=%s\n' "$tag" >> "$GITHUB_ENV"

      - uses: agoodkind/swift-makefile/.github/actions/setup-build-env@main
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
          github-token: ${{ github.token }}

      - name: Install Tuist dependencies
        run: make install-dependencies

      - name: Download release DMG
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p Products
          gh release download "$RELEASE_TAG" \
            --pattern "StickiesImproved-*.dmg" \
            --dir Products \
            --clobber

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          dmg_path="$(find Products -maxdepth 1 -name 'StickiesImproved-*.dmg' -print | sort | head -n 1)"
          if [[ -z "$dmg_path" ]]; then
              echo "No StickiesImproved DMG was downloaded for ${RELEASE_TAG}" >&2
              exit 1
          fi

          dmg_name="$(basename "$dmg_path")"
          build_version="${dmg_name#StickiesImproved-}"
          build_version="${build_version%.dmg}"
          key_path="$RUNNER_TEMP/sparkle_private_key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$key_path"
          export SPARKLE_PRIVATE_KEY_FILE="$key_path"

          make prepare-sparkle-updates \
            CURRENT_PROJECT_VERSION="$build_version" \
            RELEASE_TAG="$RELEASE_TAG" \
            GITHUB_RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/"

      - uses: actions/upload-artifact@v7
        with:
          name: appcast
          path: build/sparkle-updates/appcast.xml
          if-no-files-found: error

      - name: Stage appcast asset
        run: cp build/sparkle-updates/appcast.xml deploy/appcast-worker/public/appcast.xml

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Deploy appcast worker
        working-directory: deploy/appcast-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml
